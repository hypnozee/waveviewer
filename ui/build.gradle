plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.paradoxcat.waveformtest.ui'
    compileSdk = 36

    defaultConfig {
        minSdk 29
    }

    kotlin {
        jvmToolchain(17)
    }
}

dependencies {
    implementation project(':domain')
    testImplementation 'junit:junit:4.13.2'
}